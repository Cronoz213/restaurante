<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Mesa - Painel Administrativo</title>
  <link rel="stylesheet" href="../admin-style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar">
      <h1><i class="bi bi-cup-hot-fill"></i> Bella Vista</h1>
      <span class="sidebar-subtitle">Painel Admin</span>

      <ul class="sidebar-menu">
        <li><a href="../dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)"><i class="bi bi-tags"></i> Categorias</a>
          <ul class="submenu" id="submenu-categorias">
            <li><a href="../categorias/listar.html">Listar</a></li>
            <li><a href="../categorias/form.html">Nova Categoria</a></li>
          </ul>
        </li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)"><i class="bi bi-egg-fried"></i> Pratos</a>
          <ul class="submenu" id="submenu-pratos">
            <li><a href="../pratos/listar.html">Listar</a></li>
            <li><a href="../pratos/form.html">Novo Prato</a></li>
          </ul>
        </li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)"><i class="bi bi-table"></i> Mesas</a>
          <ul class="submenu active" id="submenu-mesas">
            <li><a href="listar.html">Listar</a></li>
            <li><a href="form.html" class="active">Nova Mesa</a></li>
          </ul>
        </li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)"><i class="bi bi-calendar-date"></i> Reservas</a>
          <ul class="submenu" id="submenu-reservas">
            <li><a href="../reservas/listar.html">Listar</a></li>
            <li><a href="../reservas/form.html">Nova Reserva</a></li>
          </ul>
        </li>

        <li style="margin-top: 30px; padding-top: 30px; border-top: 1px solid #34495e;">
          <a href="#" onclick="fazerLogout()"><i class="bi bi-box-arrow-right"></i> Sair</a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header-page">
        <h2>Nova Mesa</h2>
      </div>

      <div class="form-section">
        <form onsubmit="salvarMesa(event)">
          <div class="form-row">
            <div class="form-group required">
              <label for="numero">Número da Mesa</label>
              <input type="number" id="numero" name="numero" required placeholder="1">
            </div>

            <div class="form-group required">
              <label for="capacidade">Capacidade (pessoas)</label>
              <input type="number" id="capacidade" name="capacidade" required min="1" max="20" placeholder="2">
            </div>
          </div>

          <div class="form-group required">
            <label for="localizacao">Localização</label>
            <input type="text" id="localizacao" name="localizacao" required placeholder="Ex: Canto aconchegante, Varanda, etc.">
          </div>

          <div class="form-group required">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="livre">Livre</option>
              <option value="ocupada">Ocupada</option>
              <option value="reservada">Reservada</option>
            </select>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Salvar Mesa</button>
            <a href="listar.html" class="btn btn-secondary"><i class="bi bi-x-lg"></i> Cancelar</a>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    window.addEventListener('load', function() {
      if (localStorage.getItem('user_logged') !== 'true') {
        window.location.href = '../login.html';
      }
    });

    function toggleSubmenu(event) {
      event.preventDefault();
      const submenu = event.target.nextElementSibling;
      if (submenu && submenu.classList.contains('submenu')) {
        submenu.classList.toggle('active');
      }
    }

    function fazerLogout() {
      if (confirm('Tem certeza que deseja sair?')) {
        localStorage.removeItem('user_logged');
        localStorage.removeItem('username');
        window.location.href = '../login.html';
      }
    }

    function salvarMesa(event) {
      event.preventDefault();
      alert('✓ Mesa salva com sucesso!');
      window.location.href = 'listar.html';
    }
  </script>
</body>
</html>
