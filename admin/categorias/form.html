<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria - Painel Administrativo</title>
  <link rel="stylesheet" href="../admin-style.css">
</head>
<body>
  <div class="admin-wrapper">
    <aside class="sidebar">
      <h1>🍷 Bella Vista</h1>
      <span class="sidebar-subtitle">Painel Admin</span>

      <ul class="sidebar-menu">
        <li><a href="../dashboard.html">📊 Dashboard</a></li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)">📋 Categorias</a>
          <ul class="submenu active" id="submenu-categorias">
            <li><a href="listar.html">Listar</a></li>
            <li><a href="form.html" class="active">Nova Categoria</a></li>
          </ul>
        </li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)">🍽️ Pratos</a>
          <ul class="submenu" id="submenu-pratos">
            <li><a href="../pratos/listar.html">Listar</a></li>
            <li><a href="../pratos/form.html">Novo Prato</a></li>
          </ul>
        </li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)">🪑 Mesas</a>
          <ul class="submenu" id="submenu-mesas">
            <li><a href="../mesas/listar.html">Listar</a></li>
            <li><a href="../mesas/form.html">Nova Mesa</a></li>
          </ul>
        </li>

        <li>
          <a href="#" onclick="toggleSubmenu(event)">📅 Reservas</a>
          <ul class="submenu" id="submenu-reservas">
            <li><a href="../reservas/listar.html">Listar</a></li>
            <li><a href="../reservas/form.html">Nova Reserva</a></li>
          </ul>
        </li>

        <li style="margin-top: 30px; padding-top: 30px; border-top: 1px solid #34495e;">
          <a href="#" onclick="fazerLogout()">🚪 Sair</a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="header-page">
        <h2>Nova Categoria</h2>
      </div>

      <div class="form-section">
        <form onsubmit="salvarCategoria(event)">
          <div class="form-group required">
            <label for="nome">Nome da Categoria</label>
            <input type="text" id="nome" name="nome" required placeholder="Ex: Entradas">
          </div>

          <div class="form-group">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" name="descricao" placeholder="Descrição breve da categoria"></textarea>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" id="ativo" name="ativo" checked>
              Ativo
            </label>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn btn-success">✓ Salvar Categoria</button>
            <a href="listar.html" class="btn btn-secondary">✕ Cancelar</a>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    window.addEventListener('load', function() {
      if (localStorage.getItem('user_logged') !== 'true') {
        window.location.href = '../login.html';
      }
    });

    function toggleSubmenu(event) {
      event.preventDefault();
      const submenu = event.target.nextElementSibling;
      if (submenu && submenu.classList.contains('submenu')) {
        submenu.classList.toggle('active');
      }
    }

    function fazerLogout() {
      if (confirm('Tem certeza que deseja sair?')) {
        localStorage.removeItem('user_logged');
        localStorage.removeItem('username');
        window.location.href = '../login.html';
      }
    }

    function salvarCategoria(event) {
      event.preventDefault();
      alert('✓ Categoria salva com sucesso!');
      window.location.href = 'listar.html';
    }
  </script>
</body>
</html>
