<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Painel Administrativo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .login-container {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      width: 100%;
      max-width: 450px;
      padding: 0;
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }

    .login-header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .login-form {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: bold;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #bdc3c7;
      border-radius: 5px;
      background-color: #fff;
      color: #333;
      font-family: Segoe UI, sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-group input::placeholder {
      color: #95a5a6;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .remember-me {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .remember-me input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
    }

    .remember-me label {
      margin: 0;
      font-weight: normal;
      color: #7f8c8d;
      cursor: pointer;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .demo-info {
      background-color: #f0f7ff;
      border-left: 4px solid #3498db;
      padding: 15px;
      border-radius: 5px;
      margin-top: 25px;
      font-size: 0.9rem;
    }

    .demo-info p {
      color: #0c5460;
      margin-bottom: 8px;
    }

    .demo-info strong {
      color: #004085;
    }

    .alert-message {
      padding: 12px;
      border-radius: 5px;
      margin-bottom: 20px;
      display: none;
    }

    .alert-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .alert-error.show {
      display: block;
    }

    @media (max-width: 480px) {
      .login-container {
        margin: 15px;
      }

      .login-header {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }

      .login-form {
        padding: 25px;
      }

      .form-group {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🍷 Bella Vista</h1>
      <p>Painel Administrativo</p>
    </div>

    <div class="login-form">
      <div id="alert-error" class="alert-message alert-error"></div>

      <form onsubmit="fazerLogin(event)">
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" name="usuario" required placeholder="Digite seu usuário">
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
        </div>

        <div class="remember-me">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Manter-me conectado</label>
        </div>

        <button type="submit" class="btn-login">🔓 Entrar</button>
      </form>

      <div class="demo-info">
        <p><strong>📝 Dados de Demonstração:</strong></p>
        <p>Usuário: <code>admin</code><br>Senha: <code>senha123</code></p>
      </div>
    </div>
  </div>

  <script>
    function fazerLogin(event) {
      event.preventDefault();

      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value;
      const alertError = document.getElementById('alert-error');

      const usuariosValidos = {
        'admin': 'senha123',
        'gerente': 'gerente123',
        'teste': 'teste'
      };

      if (usuariosValidos[usuario] && usuariosValidos[usuario] === senha) {
        localStorage.setItem('user_logged', 'true');
        localStorage.setItem('username', usuario);
        window.location.href = 'dashboard.html';
      } else {
        alertError.textContent = '❌ Usuário ou senha inválido!';
        alertError.classList.add('show');
        setTimeout(() => {
          alertError.classList.remove('show');
        }, 4000);
      }
    }

    window.addEventListener('load', function() {
      if (localStorage.getItem('user_logged') === 'true') {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
